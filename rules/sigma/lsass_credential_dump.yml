title: LSASS Memory Access - Credential Dumping Attempt
id: e5f6a7b8-c9d0-4e1f-2a3b-4c5d6e7f8091
status: experimental
description: >
    Detects processes accessing LSASS memory which may indicate
    credential dumping (e.g., Mimikatz, ProcDump, comsvcs.dll).
    Uses Sysmon Event ID 10 (ProcessAccess).
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://github.com/TiltedLunar123/SIEMForge
author: Jude Hilgendorf
date: 2025/06/15
modified: 2025/06/15
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    product: windows
    service: sysmon
detection:
    selection:
        EventID: 10
        TargetImage|endswith: '\\lsass.exe'
        GrantedAccess|contains:
            - '0x1010'
            - '0x1038'
            - '0x1F0FFF'
            - '0x1F1FFF'
            - '0x143A'
    filter_system:
        SourceImage|endswith:
            - '\\MsMpEng.exe'
            - '\\csrss.exe'
            - '\\wininit.exe'
            - '\\wmiprvse.exe'
            - '\\svchost.exe'
            - '\\msiexec.exe'
    condition: selection and not filter_system
fields:
    - SourceImage
    - TargetImage
    - GrantedAccess
    - SourceUser
    - CallTrace
falsepositives:
    - Antivirus real-time scanning
    - Windows Error Reporting
    - Legitimate admin tools with process inspection
level: critical
