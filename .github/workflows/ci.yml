name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=siemforge --cov=converters --cov-report=term-missing

      - name: Validate Sigma rules
        run: python -m siemforge --validate

      - name: Smoke test converter
        run: python -m siemforge --convert splunk > /dev/null

      - name: Smoke test scanner
        run: python -m siemforge --scan samples/powershell_attack.json
