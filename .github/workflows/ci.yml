name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    env:
      PYTHONUTF8: "1"
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=siemforge --cov=converters --cov-report=term-missing

      - name: Validate Sigma rules
        run: python -m siemforge --validate

      - name: Smoke test converters
        run: |
          python -m siemforge --convert splunk > /dev/null
          python -m siemforge --convert elastic > /dev/null
          python -m siemforge --convert kibana > /dev/null
        shell: bash

      - name: Smoke test scanner
        run: |
          python -m siemforge --scan samples/powershell_attack.json
          python -m siemforge --scan samples/ssh_bruteforce.log

      - name: Smoke test MITRE and export
        run: |
          python -m siemforge --mitre
          python -m siemforge --export-all --dry-run
